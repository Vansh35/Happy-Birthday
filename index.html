</head>
<body>
<div id="app">
  <canvas id="starfield"></canvas>
  <div id="sceneDots"></div>
  <div id="textLayer"></div>
  <button id="soundToggle" title="Toggle sound" aria-label="Toggle ambient sound">♪</button>

    <span><kbd>Space</kbd>Skip</span>
    <span><kbd>R</kbd>Restart</span>
  </div>

  <div id="startScreen">
    <div class="eyebrow chrome-type">A SHORT FILM FOR</div>

    <button class="start-btn chrome-type">Click to Begin</button>
  </div>
</div>
<script>

  }

  }
  const textLayer = document.getElementById('textLayer');
  const sceneDots = document.getElementById('sceneDots');
  const uiChrome = document.getElementById('uiChrome');
  const blackout = document.getElementById('blackout');
  const startScreen = document.getElementById('startScreen');
  const soundToggle = document.getElementById('soundToggle');
  SCENES.forEach((s) => { const d = document.createElement('div'); d.className = 'dot'; d.dataset.scene = s.id; sceneDots.appendChild(d); });
  function setActiveDot(sceneId) { sceneDots.querySelectorAll('.dot').forEach((d) => { d.classList.toggle('active', Number(d.dataset.scene) === sceneId); }); }
  function makeCard(html, extraClass) {
    const el = document.createElement('div');

  let activeCueTimers = [];

  }
  function enterScene1() {
    clearTextLayer();
    const line1 = makeCard('The universe was peaceful.'); const line2 = makeCard('Everything was perfectly balanced.');

  }
  function enterScene2() {
    clearTextLayer();

    const drama = makeCard('Dramatic consequences followed.', 'sub');

  function enterScene4() {
    clearTextLayer();

  function enterScene5() {

  function enterScene6() {

  const SCENE_ENTER_FNS = { 1: enterScene1, 2: enterScene2, 3: enterScene3, 4: enterScene4, 5: enterScene5, 6: enterScene6 };
  function sceneIndexForTime(t) { for (let i = SCENES.length - 1; i >= 0; i--) { if (t >= SCENES[i].start) return i; } return 0; }
